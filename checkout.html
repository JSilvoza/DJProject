<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Checkout — DG Studio">
  <title>Checkout — DG Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/main.css">

  <style>
    .checkout-page {
      min-height: 100vh;
      padding-top: var(--header-h);
      background: var(--clr-bg);
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      min-height: calc(100vh - var(--header-h));
    }

    .checkout-form-col {
      padding: var(--sp-10) var(--sp-10) var(--sp-10) var(--sp-16);
      max-width: 640px;
      margin-left: auto;
      width: 100%;
    }

    .checkout-summary-col {
      background: var(--clr-surface);
      border-left: 1px solid var(--clr-border);
      padding: var(--sp-10) var(--sp-8);
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
    }

    .checkout-header {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      margin-bottom: var(--sp-8);
    }

    .checkout-back {
      color: var(--clr-text-secondary);
      font-size: var(--text-sm);
      transition: color var(--ease-fast);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .checkout-back:hover { color: var(--clr-text); }

    .checkout-logo {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--clr-text);
    }

    /* Progress bar */
    .checkout-progress {
      display: flex;
      align-items: center;
      margin-bottom: var(--sp-8);
      font-size: var(--text-xs);
    }

    .checkout-progress__step {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      color: var(--clr-text-muted);
    }
    .checkout-progress__step.active { color: var(--clr-text); }
    .checkout-progress__step.done   { color: var(--clr-accent); }

    .checkout-progress__num {
      width: 22px;
      height: 22px;
      border-radius: var(--radius-full);
      border: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: var(--weight-semibold);
    }
    .checkout-progress__step.active .checkout-progress__num {
      background: var(--clr-text);
      color: var(--clr-bg);
      border-color: var(--clr-text);
    }
    .checkout-progress__step.done .checkout-progress__num {
      background: var(--clr-accent);
      color: var(--clr-bg);
      border-color: var(--clr-accent);
    }

    .checkout-progress__line {
      flex: 1;
      height: 1px;
      background: var(--clr-border);
      margin-inline: var(--sp-3);
    }

    .checkout-step__title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      margin-bottom: var(--sp-6);
      padding-bottom: var(--sp-4);
      border-bottom: 1px solid var(--clr-border);
    }

    /* Summary sidebar */
    .checkout-summary__item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: var(--sp-3);
      align-items: center;
      padding-bottom: var(--sp-4);
      margin-bottom: var(--sp-4);
      border-bottom: 1px solid var(--clr-border);
    }
    .checkout-summary__item:last-child { border-bottom: none; margin-bottom: 0; }

    .checkout-summary__img-wrap {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--clr-surface-3);
    }
    .checkout-summary__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .checkout-summary__qty {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--clr-text-secondary);
      color: var(--clr-bg);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--weight-bold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkout-summary__name {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-snug);
      margin-bottom: 2px;
    }
    .checkout-summary__meta {
      font-size: var(--text-xs);
      color: var(--clr-text-secondary);
    }
    .checkout-summary__price {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      white-space: nowrap;
    }

    .checkout-summary__divider {
      height: 1px;
      background: var(--clr-border);
      margin-block: var(--sp-5);
    }

    .checkout-summary__row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      color: var(--clr-text-secondary);
      margin-bottom: var(--sp-3);
    }

    .checkout-summary__total {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--clr-text);
      padding-top: var(--sp-4);
      border-top: 1px solid var(--clr-border);
      margin-top: var(--sp-2);
    }

    /* Shipping method */
    .shipping-method {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-4);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color var(--ease-fast), background var(--ease-fast);
    }
    .shipping-method:hover { border-color: var(--clr-border-hover); }
    .shipping-method.active {
      border-color: var(--clr-accent);
      background: var(--clr-accent-dim);
    }
    .shipping-methods { display: flex; flex-direction: column; gap: var(--sp-2); }

    .shipping-method__info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .shipping-method__label {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
    }
    .shipping-method__eta {
      font-size: var(--text-xs);
      color: var(--clr-text-secondary);
    }
    .shipping-method__price {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
    }

    @media (max-width: 900px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .checkout-summary-col {
        position: static;
        height: auto;
        border-left: none;
        border-top: 1px solid var(--clr-border);
        order: -1;
      }
      .checkout-form-col { padding: var(--sp-8) var(--sp-4); margin: 0; }
    }
  </style>
</head>
<body>

  <!-- Minimal checkout header -->
  <header class="header" id="header">
    <div class="header__inner container">
      <a href="cart.html" class="checkout-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Cart
      </a>
      <a href="index.html" class="header__logo">DG</a>
      <div style="width:80px"></div>
    </div>
  </header>

  <main class="checkout-page">
    <div class="checkout-layout">

      <!-- Form column -->
      <div class="checkout-form-col">
        <div class="checkout-progress" id="checkoutProgress"></div>
        <div id="checkoutContent"></div>
      </div>

      <!-- Summary column -->
      <div class="checkout-summary-col">
        <div style="font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--clr-text-secondary);margin-bottom:var(--sp-5)">
          Order Summary
        </div>
        <div id="checkoutSummary"></div>
      </div>

    </div>
  </main>

  <script src="assets/js/data/products.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      DG.ui.initNav();
    });
  </script>
</body>
</html>
